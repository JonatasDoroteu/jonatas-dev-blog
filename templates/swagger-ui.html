<!DOCTYPE html>
<html>
  <head>
    {% block head %}
    <title>{{ title|default:"Swagger" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if favicon_href %}<link rel="icon" href="{{ favicon_href }}">{% endif %}
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:after, *:before { box-sizing: inherit; }
      body { background: #0a1121; margin: 0; color: #fff; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .swagger-topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 1.25rem; background: #07101f; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .swagger-topbar .brand { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }
      .swagger-topbar a { color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.14); padding: 0.75rem 1rem; border-radius: 999px; background: rgba(79, 91, 255, 0.16); transition: background 0.2s ease, transform 0.2s ease; }
      .swagger-topbar a:hover { background: rgba(79, 91, 255, 0.28); transform: translateY(-1px); }
      #swagger-ui { min-height: calc(100vh - 72px); }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <div class="swagger-topbar">
      <div class="brand">Jonatas.dev API Docs</div>
      <a href="{% url 'post_list' %}">Voltar ao site</a>
    </div>
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}
    <script src="{{ script_url }}"></script>
    {% else %}
    <script>
    {% include template_name_js %}
    </script>
    {% endif %}
    {% endblock %}
  </body>
</html>
